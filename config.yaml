desk:
  max_leverage: 10
  max_position_size_pct: 0.20
  max_concurrent_positions: 3
  wake_interval_seconds: 300
  starting_balance: 50000.0
  target_agent_count: 10
  drawdown_kill_pct: 0.15
  heartbeat_interval_seconds: 300
  heartbeat_path: "data/heartbeat.json"
  taker_fee: 0.00035
  maker_fee: -0.00005
  max_gross_exposure_mult: 2.0
  max_evidence_terms: 4
  event_calendar:
    - name: "FOMC"
      at: "2026-07-29T18:00:00Z"
    - name: "CPI"
      at: "2026-08-12T12:30:00Z"
    - name: "FOMC"
      at: "2026-09-16T18:00:00Z"
    - name: "CPI"
      at: "2026-09-10T12:30:00Z"

# coinalyze:
#   api_key: "..."              # alternative to COINALYZE_API_KEY env var; heartbeat liq_* fields degrade to null if neither is set

data_source: hyperliquid          # stub | hyperliquid
llm_backend: ollama                # stub | ollama — ollama uses the local Ollama instance
llm_model: "qwen3.6:35b_optimized" # model name passed to Ollama's /api/chat

# Repo-relative path to the git-native JSONL ledger (candles/funding/oi/
# liquidations). agents/reflection.py's mandatory walk-forward gate reads
# config["ledger_dir"] directly (fails loudly if absent) -- see CLAUDE.md
# "Config convention".
ledger_dir: "ledger"
